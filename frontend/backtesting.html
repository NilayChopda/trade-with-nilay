<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Trade_with_Nilay - Backtesting Performance</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d4af35",
                        "background-light": "#f8f7f6",
                        "background-dark": "#201d12",
                    },
                    fontFamily: { "display": ["Inter"] },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="flex h-screen overflow-hidden">
    <aside class="w-64 border-r border-primary/20 bg-white dark:bg-slate-950 flex flex-col h-full">
        <div class="p-6 border-b border-primary/10">
            <div class="flex items-center gap-3">
                <div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
                    <span class="material-symbols-outlined">analytics</span>
                </div>
                <h2 class="text-xl font-bold tracking-tight text-primary">Trade_with_Nilay</h2>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-1 overflow-y-auto custom-scrollbar">
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" href="index.html">

            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" href="screener.html">

            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" href="scanner-hub.html">

                <span class="text-sm">Nilay's Scanner Hub</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" href="fundamentals.html">
                <span class="material-symbols-outlined">analytics</span>
                <span class="text-sm">Fundamental</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" href="sector-rotation.html">
                <span class="material-symbols-outlined">sync_alt</span>
                <span class="text-sm">Sector Rotation</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" href="news.html">
                <span class="material-symbols-outlined">newspaper</span>
                <span class="text-sm">News & Events</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" href="ai-chat.html">
                <span class="material-symbols-outlined">smart_toy</span>
                <span class="text-sm">AI Chatbot</span>
            </a>
        </nav>

        <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-primary/10 px-8 py-4 flex items-center justify-between">
            <h1 class="text-xl font-bold">Backtesting History</h1>
            <button class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg shadow-primary/20">Export Report</button>
        </header>

        <div class="p-8 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-white p-6 rounded-xl border border-primary/10 shadow-sm">
                    <span class="text-slate-500 text-sm font-medium">Win Ratio</span>
                    <p class="text-3xl font-bold text-primary">68.5%</p>
                </div>
                </div>

            <div class="bg-white rounded-xl border border-primary/10 shadow-sm overflow-hidden">
                <div class="p-6 bg-slate-50/50 font-bold border-b border-primary/5">Detailed Backtest Logs</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/50 text-slate-400 text-[10px] uppercase font-bold">
                            <tr><th class="px-6 py-4">Date</th><th class="px-6 py-4">Symbol</th><th class="px-6 py-4">Result</th></tr>
                        </thead>
                        <tbody class="text-sm divide-y divide-primary/5">
                            <tr><td class="px-6 py-4">2023-11-20</td><td class="px-6 py-4 font-bold">RELIANCE</td><td class="px-6 py-4 text-green-600 font-bold">TARGET HIT</td></tr>

                    </table>
                </div>
            </div>
