<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Trade_with_Nilay — AI Chatbot</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d4af35",
                        "background-light": "#f8f7f6",
                        "background-dark": "#201d12",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="flex h-screen overflow-hidden">
    <aside class="w-64 flex-shrink-0 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark flex flex-col">
        <div class="p-6 flex items-center gap-3">
            <div class="size-10 rounded-full bg-primary flex items-center justify-center text-white">
                <span class="material-symbols-outlined">trending_up</span>
            </div>
            <div class="flex flex-col">
                <h1 class="text-slate-900 dark:text-slate-100 text-sm font-bold leading-tight">Trade_with_Nilay</h1>
                <p class="text-slate-500 dark:text-slate-400 text-xs font-normal">Premium Trading AI</p>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-2 py-4">
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="index.html">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="text-sm font-medium">Dashboard</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="screener.html">
                <span class="material-symbols-outlined">filter_alt</span>
                <span class="text-sm font-medium">Screener</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="scanner-hub.html">
                <span class="material-symbols-outlined">hub</span>
                <span class="text-sm font-medium">Scanner Hub</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 text-primary transition-colors" href="ai-chat.html">
                <span class="material-symbols-outlined font-fill">chat_bubble</span>
                <span class="text-sm font-medium">AI Chat</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="sector-rotation.html">
                <span class="material-symbols-outlined">sync_alt</span>
                <span class="text-sm font-medium">Sector Rotation</span>
            </a>
            <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="news.html">
                <span class="material-symbols-outlined">newspaper</span>
                <span class="text-sm font-medium">News</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-background-dark overflow-hidden">
        <header class="h-16 flex items-center justify-between px-8 border-b border-slate-100 dark:border-slate-800">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">auto_awesome</span>
                <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold">Nilay's AI Analyst</h2>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto no-scrollbar p-6">
            <div class="max-w-4xl mx-auto space-y-6">
                <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-2xl p-8 shadow-sm">
                    <h4 class="font-bold mb-4">How can I help your trade today?</h4>
                    <div class="prose dark:prose-invert max-w-none text-slate-700 dark:text-slate-300">
                        <p>Ask me about fundamentals, technical patterns, or sector trends.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-6 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-background-dark">
            <div class="max-w-4xl mx-auto flex items-center gap-4">
                <textarea class="w-full pl-4 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl resize-none" placeholder="Ask Nilay AI..." rows="1"></textarea>
                <button class="p-3 bg-primary text-white rounded-lg"><span class="material-symbols-outlined">send</span></button>
            </div>
        </div>
    </main>
</div>
</body>
</html>
